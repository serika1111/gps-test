<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; }

    #map {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    #map img {
      width: 100%;
      display: block;
    }

    #dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

<div id="map">
  <img src="lilo.jpg" id="mapImg">
  <div id="dot"></div>
</div>

<script>

// 🎯 mapping (ჯერ დროებითი, მერე შევცვლით affine-ით)

function gpsToXY(lat, lon) {

  const pts = [
    { lat: 41.69296816050202, lon: 45.01076111307317, x: 58,  y: 561 }, // p1
    { lat: 41.69505199095477, lon: 45.01132406746814, x: 171, y: 3   }, // p2
    { lat: 41.694823258180094, lon: 45.01420452100431, x: 747, y: 62  }, // p3
    { lat: 41.69293064770812, lon: 45.01423910621728, x: 754, y: 570 }  // p4
  ];

  function solveHomography(pts) {
    const A = [];
    const B = [];

    pts.forEach(p => {
      const X = p.lon;
      const Y = p.lat;

      A.push([X, Y, 1, 0, 0, 0, -p.x*X, -p.x*Y]);
      B.push(p.x);

      A.push([0, 0, 0, X, Y, 1, -p.y*X, -p.y*Y]);
      B.push(p.y);
    });

    function solve(A, B) {
      const n = B.length;

      for (let i = 0; i < n; i++) {
        let maxRow = i;
        for (let k = i + 1; k < n; k++) {
          if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) {
            maxRow = k;
          }
        }

        [A[i], A[maxRow]] = [A[maxRow], A[i]];
        [B[i], B[maxRow]] = [B[maxRow], B[i]];

        let pivot = A[i][i];
        for (let j = i; j < n; j++) A[i][j] /= pivot;
        B[i] /= pivot;

        for (let k = 0; k < n; k++) {
          if (k !== i) {
            let factor = A[k][i];
            for (let j = i; j < n; j++) {
              A[k][j] -= factor * A[i][j];
            }
            B[k] -= factor * B[i];
          }
        }
      }

      return B;
    }

    const h = solve(A, B);

    return [
      [h[0], h[1], h[2]],
      [h[3], h[4], h[5]],
      [h[6], h[7], 1]
    ];
  }

  const H = solveHomography(pts);

  const X = lon;
  const Y = lat;

  const denom = H[2][0]*X + H[2][1]*Y + H[2][2];

  return {
    x: (H[0][0]*X + H[0][1]*Y + H[0][2]) / denom,
    y: (H[1][0]*X + H[1][1]*Y + H[1][2]) / denom
  };
}

const testPoints = [
  { lat: 41.69296610309111, lon: 45.01075302134429, color: "blue" },   // p1
  { lat: 41.69473208443149, lon: 45.0127916834419,  color: "green" },  // p2
  { lat: 41.69406747348808, lon: 45.01376651147195, color: "yellow" }, // p3
  { lat: 41.69293445423774, lon: 45.01302055610982, color: "purple" }  // p4
];

function drawTestPoints() {
  testPoints.forEach((p) => {
    const pos = gpsToXY(p.lat, p.lon);

    const d = document.createElement("div");
    d.style.position = "absolute";
    d.style.width = "10px";
    d.style.height = "10px";
    d.style.borderRadius = "50%";
    d.style.background = p.color;
    d.style.transform = "translate(-50%, -50%)";

    d.style.left = pos.x + "px";
    d.style.top  = pos.y + "px";

    document.getElementById("map").appendChild(d);
  });
}

// გაუშვი
drawTestPoints();

// UI
const dot = document.getElementById("dot");
const img = document.getElementById("mapImg");
const map = document.getElementById("map");

map.addEventListener("click", (e) => {
  const rect = map.getBoundingClientRect();

  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  console.log("CLICK:", Math.round(x), Math.round(y));
});

// 👇 ეს ჩასვი აქ
document.body.insertAdjacentHTML(
  "beforeend",
  `<div id="debug" style="
    position:fixed;
    bottom:10px;
    left:10px;
    background:#000;
    color:#0f0;
    padding:5px;
    font-size:12px;
    z-index:9999;
  "></div>`
);

navigator.geolocation.watchPosition((pos) => {
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  // ეკრანზე გაჩვენებს GPS-ს
  document.getElementById("debug").innerText =
    `LAT: ${lat}\nLON: ${lon}`;

  const pixel = gpsToXY(lat, lon);

  dot.style.left = pixel.x + "px";
  dot.style.top  = pixel.y + "px";
});

</script>

</body>
</html>
