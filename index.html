<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
</head>

<body style="display:flex; flex-direction:column; height:100vh; margin:0; background:black; font-family:Arial, Helvetica, sans-serif;">

<!-- 🔥 HUD -->
<div id="hud" style="
  position:relative;
  top:0;
  left:0;
  width:100%;
  height:60px;
  padding-top:env(safe-area-inset-top);
  color:white;
  font-size:16px;
    font-weight:bold;
    background:rgba(0,0,0,0.85);
  display:flex;
  align-items:center;
  padding-left:8px;
  z-index:999;
  font-family:monospace;
">
  <span id="hudText">GPS...</span>
<span id="versionText" style="margin-left:auto; padding-right:10px;">v?</span>
</div>

<div id="screen" style="flex:1; display:flex; flex-direction:column;"></div>

<div id="gpsStatus" style="
  position:fixed;
  bottom:10px;
  left:10px;
  color:white;
  font-size:12px;
  opacity:0.7;
">
GPS: starting...
</div>

<script src="version.js"></script>

<script type="module">

// 🔥 SERVICE WORKER

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {

    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;

      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed') {
          if (navigator.serviceWorker.controller) {
            newWorker.postMessage({ action: 'skipWaiting' });
          }
        }
      });
    });

  });

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

// 🔥 WAKE LOCK
let wakeLock = null;

async function keepScreenOn(){
  try{
    wakeLock = await navigator.wakeLock.request('screen');
  }catch(e){
    console.log("Wake lock failed", e);
  }
}

keepScreenOn();

document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible"){
    keepScreenOn();
  }
});

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyB4OVjTmL5vol7tleOqgYKSqDPtf7gjQu0",
  databaseURL: "https://gtcc-control-default-rtdb.firebaseio.com/",
  projectId: "gtcc-control",
});

const db = getDatabase(app);

let zones = {};
let allGreen = false;
let fcy = false;
let fcy_sc = false;
let red = false;
let finish = false;
let mode = "GPS";

onValue(ref(db,'zones'), s=>{
  const data = s.val() || {};
  zones = {};
  for(const k in data){
    zones[k] = data[k]?.value || null;
  }
  render();
});

onValue(ref(db,'allGreen'), s=>{ allGreen = s.val()?.value === true; render(); });
onValue(ref(db,'fcy'), s=>{ fcy = s.val()?.value === true; render(); });
onValue(ref(db,'fcy_sc'), s=>{ fcy_sc = s.val()?.value === true; render(); });
onValue(ref(db,'red'), s=>{ red = s.val()?.value === true; render(); });
onValue(ref(db,'finish'), s=>{ finish = s.val()?.value === true; render(); });
onValue(ref(db,'mode'), s=>{
  mode = s.val()?.value || "GPS";
  render();
});

//////////////////////////////////////////////////////////
// ZONES (GPS)
//////////////////////////////////////////////////////////

const zonePoints = {
  ST:{lat: 41.69462987791554,lon: 45.0125566678699,r:8},
  MP1:{lat: 41.694400073390966,lon: 45.01208381898457,r:8},
  MP2:{lat: 41.69400742534534,lon: 45.01173733487709,r:8},
  MP3:{lat: 41.69360716537352,lon: 45.01143365175041,r:8},
  MP4:{lat: 41.69318559609178,lon: 45.011138121184594,r:8},
  MP5:{lat: 41.69309235248186,lon: 45.011786748896625,r:8},
  MP6:{lat: 41.69338947721215,lon: 45.0121081651916,r:8},
  MP7:{lat: 41.69378234603707,lon: 45.01218660657651,r:8},
  MP8:{lat: 41.69399663710925,lon: 45.012626643576276,r:8},
  MP9:{lat: 41.69363805631222,lon: 45.01286770732846,r:8},
  MP10:{lat: 41.69323090039279,lon: 45.012978673194176,r:8},
  MP11:{lat: 41.693392334450294,lon: 45.01342636300292,r:8}, 
  MP12:{lat: 41.69382091848505,lon: 45.01356220052035,r:8},
  MP13:{lat: 41.694240928069675,lon: 45.01350289118125,r:8},
  FN:{lat: 41.6945966483257,lon: 45.013091552247744,r:8}
};

function getDistance(lat1, lon1, lat2, lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function detectZone(lat, lon){
  for(const key in zonePoints){
    const z=zonePoints[key];
    const d=getDistance(lat,lon,z.lat,z.lon);
    if(d<z.r) return key;
  }
  return null;
}

let currentZone=null,lastZone=null,stableCount=0;

function detectStableZone(lat, lon){
  const z=detectZone(lat,lon);
  if(z===lastZone) stableCount++; else stableCount=0;
  lastZone=z;
  if(stableCount>=2) currentZone=z;
  return currentZone;
}

let displayZone=null;

let displayTimer = null;

function clearDisplay(){
  if(displayTimer){
    clearTimeout(displayTimer);
    displayTimer = null;
  }

  if(displayZone !== null){
    displayZone = null;
    render();
  }
}

function triggerEvent(zone){

  // 💣 ყოველთვის ჩავაქროთ ძველი
  clearDisplay();

  // ❗ თუ ამ ზონაში დროშა საერთოდ არ არის → აქ ვრჩებით
  if(!zones[zone]) return;

  // ⚡ blink
  setTimeout(() => {

    displayZone = zone;
    render();

    // ⏱ 5 წამი
    displayTimer = setTimeout(() => {
      displayZone = null;
      render();
    }, 5000);

  }, 80);
}
		
let currentMP = null;
let candidateMP = null;
let candidateCount = 0;

const allowedNext = {
  ST: ["MP1"],

  MP1: ["MP2"],
  MP2: ["MP3"],
  MP3: ["MP4"],
  MP4: ["MP5"],
  MP5: ["MP6"],
  MP6: ["MP7"],
  MP7: ["MP8"],
  MP8: ["MP9"],
  MP9: ["MP10"],
  MP10: ["MP11"],
  MP11: ["MP12"],
  MP12: ["MP13"],
  MP13: ["FN"],
  FN: ["ST"]
};

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

function render(){
  const screen=document.getElementById("screen");

 screen.innerHTML="";

if(red){
  const d = base();
  d.style.background="red";
  return;
}

// 🔥 FINISH - GPS
if(finish && mode === "GPS"){
  if(displayZone === "FN"){
    const d = base();
    d.style.background = "white";
    d.style.color = "black";
    d.innerText = "🏁 FINISH";
    return;
  }
}

// 🔥 NEW: FINISH + FCY (split view)
if(finish && (fcy || fcy_sc)){
  const d1 = base();
  d1.style.background = "white";
  d1.style.color = "black";
  d1.innerText = "🏁 FINISH";

  const d2 = base();

  if(fcy_sc){
    d2.style.background = "white";
    d2.style.color = "black";
    d2.innerText = "SAFETY CAR";
  } else {
    d2.style.background = "gold";
    d2.style.color = "black";
    d2.innerText = "FCY";
  }

  return;
}

if(fcy_sc){
  const d = base();
  d.style.background = "white";
  d.style.color = "black";
  d.innerText = "SAFETY CAR";
  return;
}

if(fcy){
  const d = base();
  d.style.background = "gold";
  d.style.color = "black";
  d.innerText = "FCY";
  return;
}
// 🔵 MANUAL MODE
if(mode === "MANUAL"){

  const order = [
    "ST",
    "MP1","MP2","MP3","MP4","MP5","MP6","MP7",
    "MP8","MP9","MP10","MP11","MP12","MP13",
    "FN"
  ];

  let active = [];

  // zones
  for(const z of order){
    if(zones[z]) active.push(z);
  }

if(finish && !active.includes("FN")){
  active.push("FN");
}

  // 🔥 ALL GREEN როგორც ელემენტი (ქვედა ფენა)
  if(allGreen){
    active.unshift("ALL_GREEN"); // ქვემოთ რომ დარჩეს
  }

  // ახალი ზემოთ
  active.reverse();

active.forEach(z => {
  if(z === "ALL_GREEN"){
    const d = base();
    d.style.background = "green";

  } else if(z === "FN" && finish){
    const d = base();
    d.style.background = "white";
    d.style.color = "black";
    d.innerText = "🏁 FINISH";

  } else {
    drawZone(z);
  }
});

return; // 🔥 ეს კრიტიკულია

}

// 🟢 GPS MODE
if(displayZone && zones[displayZone]){
  drawZone(displayZone);
  return;
}

  if(allGreen){ const d=base(); d.style.background="green"; }
}

function drawZone(z){
  const color=zones[z];
  if(color==="DOUBLE") addDouble(z);
  else if(color==="DOUBLE_SC") addDoubleSC(z);
  else if(color==="YELLOW") addSingle(z);
  else if(color==="GREEN") addGreen(z);
}

function addGreen(t){const d=base();d.style.background="green";d.innerText=t;}
function addSingle(t){const d=base();d.style.background="gold";d.innerText=t;}

function addDouble(t){
  const d = base();

  d.style.background = "gold";
  d.style.position = "relative";

  d.innerText = t;

  const line = document.createElement("div");
  line.style.position = "absolute";
  line.style.top = "0";
  line.style.bottom = "0";
  line.style.left = "50%";
  line.style.width = "20px";
  line.style.background = "black";

  d.appendChild(line);
}

function addDoubleSC(t){
  const d = base();

  d.style.background = "white";
  d.style.color = "black";
  d.style.position = "relative";

  d.innerText = t + " SC";
}

function base(){
  const d=document.createElement("div");
  d.style.flex="1";
  d.style.margin="10px";
  d.style.display="flex";

  d.style.alignItems="center";
  d.style.justifyContent="flex-start"; // 👈 აქ
  d.style.paddingLeft = "40px";        // 👈 ესეც

  d.style.fontSize = "clamp(40px, 12vw, 180px)";
    d.style.fontWeight = "bold";
    d.style.letterSpacing = "0.1em"; // 🔥 განიერი ასოები
  document.getElementById("screen").appendChild(d);
  return d;
}

function box(){
  const b=document.createElement("div");
  b.style.flex="1";
  b.style.background="gold";
  b.style.display="flex";
  b.style.alignItems="center";
  b.style.justifyContent="center";
  b.style.color="black";
  b.style.fontWeight="bold";
  b.style.fontSize="6vh";
  return b;
}

//////////////////////////////////////////////////////////
// GPS
//////////////////////////////////////////////////////////

const gpsEl = document.getElementById("gpsStatus");
const hudText = document.getElementById("hudText");
const versionText = document.getElementById("versionText");
versionText.innerText = APP_VERSION;

let lastTime = null;

if(navigator.geolocation){
  navigator.geolocation.watchPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = pos.coords.accuracy;

      const now = Date.now();
      const interval = lastTime ? (now - lastTime) : 0;
      lastTime = now;

      const z = detectStableZone(lat, lon);

// 🔥 INITIAL LOCK
// 🔥 INITIAL LOCK
if(currentMP === null){

  if(z){
    if(z === candidateMP){
      candidateCount++;
    } else {
      candidateMP = z;
      candidateCount = 1;
    }

    if(candidateCount >= 3){
      currentMP = z;
      triggerEvent(z);
    }
  }

}

// 🔥 NORMAL FLOW
if(z){

  if(z === currentMP){
    // იგივე ზონა → არაფერი
  } else {

    const allowed = allowedNext[currentMP] || [];
    const isAllowed = allowed.includes(z);

    // ✔ NORMAL (allowed)
    if(isAllowed){

      clearDisplay();

      if(z === candidateMP){
        candidateCount++;
      } else {
        if(candidateCount <= 1){
          candidateMP = z;
          candidateCount = 1;
        }
      }

      if(candidateCount >= 3){
        currentMP = z;
        triggerEvent(z);
      }

    } else {

      // ❗ NOT ALLOWED → RE-LOCK

      if(z === candidateMP){
        candidateCount++;
      } else {
        candidateMP = z;
        candidateCount = 1;
      }

      if(candidateCount >= 6){
        currentMP = z;
        triggerEvent(z);
      }

    }

  }
}

      let color = acc < 3 ? "lime" : acc < 8 ? "yellow" : "red";
      hudText.style.color = color;

      hudText.innerText =
        "GPS | Z:" + (displayZone || "-") +
        " | " + acc.toFixed(1) + "m" +
        " | " + interval + "ms" +
        " | " + lat.toFixed(5) + " / " + lon.toFixed(5);

      gpsEl.innerHTML =
        "GPS<br>" +
        (displayZone || "-") + "<br>" +
        lat.toFixed(5) + "<br>" +
        lon.toFixed(5);

    },
    err => {
      hudText.style.color = "red";
      hudText.innerText = "GPS ERROR";
      gpsEl.innerText = "GPS ❌";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 20000
    }
  );
}

  // 🔥 AUTO UPDATE CHECK (არაფერი არ წაშალო, უბრალოდ დაამატე)
function pingVersion() {
  fetch('./version.js', { cache: 'no-store' })
    .catch(() => {});
}

// გახსნაზე
window.addEventListener('load', pingVersion);

// აპში დაბრუნებაზე
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    pingVersion();
  }
});
  
</script>
</body>
</html>
