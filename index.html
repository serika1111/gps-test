<!DOCTYPE html>
<html>
<body style="margin:0; background:black; font-family:Arial, Helvetica, sans-serif;">

<div id="screen" style="height:100vh; display:flex; flex-direction:column;"></div>

<div id="gpsStatus" style="
  position:fixed;
  bottom:10px;
  left:10px;
  color:white;
  font-size:12px;
  opacity:0.7;
">
GPS: starting...
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey: "AIza...",
  databaseURL: "https://gtcc-control-default-rtdb.firebaseio.com/",
  projectId: "gtcc-control",
});

const db = getDatabase(app);

let zones = {};
let allGreen = false;
let fcy = false;
let fcy_sc = false;
let red = false;
let finish = false;

onValue(ref(db,'zones'), s=>{ zones=s.val()||{}; render(); });
onValue(ref(db,'allGreen'), s=>{ allGreen=s.val()===true; render(); });
onValue(ref(db,'fcy'), s=>{ fcy=s.val()===true; render(); });
onValue(ref(db,'fcy_sc'), s=>{ fcy_sc=s.val()===true; render(); });
onValue(ref(db,'red'), s=>{ red=s.val()===true; render(); });
onValue(ref(db,'finish'), s=>{ finish=s.val()===true; render(); });

//////////////////////////////////////////////////////////
// ZONES (GPS)
//////////////////////////////////////////////////////////

const zonePoints = {
  ST:{lat:41.57091308602082,lon:44.94793302566386,r:40},
  MP1:{lat:41.703725426601615,lon:44.7810354587605,r:40},
  MP2:{lat:41.70393427102276,lon:44.78051626351449,r:40},
  MP3:{lat:41.70416684695918,lon:44.77992501671928,r:40},
  MP4:{lat:41.703269763705485,lon:44.77990170591017,r:40},
  MP5:{lat:41.57282566600706,lon:44.94744031029538,r:40},
  MP6:{lat:41.57373202413838,lon:44.94597061308161,r:40},
  MP7:{lat:41.57291307616304,lon:44.949068571941154,r:40},
  MP8:{lat:41.57044188874219,lon:44.950836844621975,r:40},
  MP9:{lat:41.56976363871468,lon:44.952313397160815,r:40},
  MP10:{lat:41.57184537364452,lon:44.95155492488257,r:40},
  MP11:{lat:41.5748940696757,lon:44.94714040881128,r:40},
  MP12:{lat:41.574097451105146,lon:44.945134502611126,r:40},
  MP13:{lat:41.57275524975666,lon:44.945450399574916,r:40},
  FN:{lat:41.57204929518776,lon:44.94632114118916,r:40}
};

function getDistance(lat1, lon1, lat2, lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function detectZone(lat, lon){
  for(const key in zonePoints){
    const z=zonePoints[key];
    const d=getDistance(lat,lon,z.lat,z.lon);
    if(d<z.r) return key;
  }
  return null;
}

let currentZone=null,lastZone=null,stableCount=0;

function detectStableZone(lat, lon){
  const z=detectZone(lat,lon);
  if(z===lastZone) stableCount++; else stableCount=0;
  lastZone=z;
  if(stableCount>=2) currentZone=z;
  return currentZone;
}

let displayZone=null;

//////////////////////////////////////////////////////////
// RENDER
//////////////////////////////////////////////////////////

function render(){
  const screen=document.getElementById("screen");
  screen.innerHTML="";

  if(red){ const d=base(); d.style.background="red"; d.style.border="10px solid black"; return;}
  if(finish){ const d=base(); d.innerHTML=`<svg width="100%" height="100%" viewBox="0 0 8 8" preserveAspectRatio="none"><defs><pattern id="chk" width="2" height="2" patternUnits="userSpaceOnUse"><rect width="2" height="2" fill="white"/><rect width="1" height="1" fill="black"/><rect x="1" y="1" width="1" height="1" fill="black"/></pattern></defs><rect width="100%" height="100%" fill="url(#chk)"/></svg>`; return;}
  if(fcy_sc){ addDoubleSC("FCY"); return;}
  if(fcy){ addDouble("FCY"); return;}

  // 🔥 GPS mode
  if(displayZone && zones[displayZone]){
    drawZone(displayZone);
    return;
  }

  // 🔥 TEST MODE (თბილისში)
  const active = Object.keys(zones).filter(k=>zones[k]);
  if(active.length>0){
    drawZone(active[0]); // პირველი აქტიური
    return;
  }

  if(allGreen){ const d=base(); d.style.background="green"; }
}

function drawZone(z){
  const color=zones[z];
  if(color==="DOUBLE") addDouble(z);
  else if(color==="DOUBLE_SC") addDoubleSC(z);
  else if(color==="YELLOW") addSingle(z);
  else if(color==="GREEN") addGreen(z);
}

// UI
function addGreen(t){const d=base();d.style.background="green";d.style.color="black";d.innerText=t;}
function addSingle(t){const d=base();d.style.background="gold";d.style.color="black";d.innerText=t;}
function addDouble(t){const d=base();d.style.display="flex";const b1=box(),b2=box();b2.style.borderLeft="12px solid black";d.appendChild(b1);d.appendChild(b2);label(d,t);}
function addDoubleSC(t){const d=base();d.style.display="flex";const b1=box(),b2=box();b2.style.borderLeft="12px solid black";labelBox(b1,t);labelBox(b2,"SC");d.appendChild(b1);d.appendChild(b2);}

function base(){const d=document.createElement("div");d.style.flex="1";d.style.margin="10px";d.style.display="flex";d.style.alignItems="center";d.style.justifyContent="center";d.style.fontSize="8vh";d.style.fontWeight="bold";d.style.position="relative";document.getElementById("screen").appendChild(d);return d;}
function box(){const b=document.createElement("div");b.style.flex="1";b.style.height="100%";b.style.background="gold";b.style.display="flex";b.style.alignItems="center";b.style.justifyContent="center";b.style.color="black";b.style.fontWeight="bold";b.style.fontSize="8vh";return b;}
function label(p,t){const l=document.createElement("div");l.innerText=t;l.style.position="absolute";l.style.color="black";l.style.fontWeight="bold";l.style.fontSize="8vh";p.appendChild(l);}
function labelBox(p,t){p.innerText=t;}

//////////////////////////////////////////////////////////
// GPS
//////////////////////////////////////////////////////////

const gpsEl=document.getElementById("gpsStatus");

if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const z=detectStableZone(lat,lon);

    if(z && z!==displayZone){
      displayZone=z;
      render();
    }

    gpsEl.innerHTML="GPS ✅<br>"+(displayZone||"-")+"<br>"+lat.toFixed(5)+"<br>"+lon.toFixed(5);

  },err=>{
    gpsEl.innerText="GPS ❌";
  },{enableHighAccuracy:true,maximumAge:0});
}

</script>
</body>
</html>
